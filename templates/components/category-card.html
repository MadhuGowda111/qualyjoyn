<a href="{{ url_for('category', slug=category.slug) }}" class="category-card">

  <div class="category-image-wrapper">
    <img
      src="{{ url_for('static', filename='images/categories/' ~ category.image) }}"
      alt="{{ category.name }}"
    >
  </div>

  <h3 class="category-title">{{ category.name }}</h3>

</a>
