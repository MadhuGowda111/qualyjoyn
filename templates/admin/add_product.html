{% extends "base.html" %}
{% block title %}Add Product | QualyJoyn{% endblock %}

{% block content %}

<section class="admin-page">
  <div class="admin-container">
    <h1>Add Product</h1>

    <form method="POST" enctype="multipart/form-data" class="admin-form">
      <div class="form-group">
        <label>Product Image</label>
        <input type="file" name="images" multiple accept="image/*" required>
      </div>


      <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Price</label>
        <input type="number" name="price" required>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select name="category" required>
          {% for category in categories %}
            <option value="{{ category.id }}">
              {{ category.name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description"></textarea>
      </div>

      <h3 class="admin-section-title">Stock Management</h3>

      <div class="stock-wrapper">

        <div class="stock-card">
          <span class="stock-size">S</span>
          <input type="number" name="stock_S" min="0" value="0">
        </div>

        <div class="stock-card">
          <span class="stock-size">M</span>
          <input type="number" name="stock_M" min="0" value="0">
        </div>

        <div class="stock-card">
          <span class="stock-size">L</span>
          <input type="number" name="stock_L" min="0" value="0">
        </div>

        <div class="stock-card">
          <span class="stock-size">XL</span>
          <input type="number" name="stock_XL" min="0" value="0">
        </div>

      </div>


      <button type="submit" class="admin-btn">Add Product</button>


    </form>
  </div>
</section>

{% endblock %}
