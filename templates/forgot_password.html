{% extends "base.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Forgot Password</h2>

    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <button type="submit" class="btn-primary">
        Send Reset Link
      </button>
    </form>

  </div>
</div>
{% endblock %}
