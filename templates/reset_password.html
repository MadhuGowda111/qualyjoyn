{% extends "base.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Reset Password</h2>

    <form method="POST">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" required>
      </div>

      <button type="submit" class="btn-primary">
        Reset Password
      </button>
    </form>

  </div>
</div>
{% endblock %}
